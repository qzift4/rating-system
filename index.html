<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ترند كار | ServiceFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #0A0A0A; }
    </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">

    <main class="max-w-md w-full bg-white rounded-[2rem] p-8 shadow-2xl">
        <header class="text-center mb-8 border-b border-gray-100 pb-6">
            <h1 class="text-3xl font-extrabold text-[#D97706] mb-2">ترند كار</h1>
            <p class="text-gray-500">نحن نهتم بجمال سيارتك</p>
        </header>

        <section class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-gray-50 p-4 rounded-2xl text-center">
                <span class="block text-gray-400 text-xs mb-1">الخصم</span>
                <span id="userDiscount" class="text-[#059669] font-bold text-2xl">0%</span>
            </div>
            <div class="bg-gray-50 p-4 rounded-2xl text-center">
                <span class="block text-gray-400 text-xs mb-1">الهدايا</span>
                <span id="userGift" class="text-gray-800 font-bold text-lg">-</span>
            </div>
        </section>

        <section class="mb-8 text-center text-sm font-bold text-gray-800 uppercase tracking-widest">
            العروض المتاحة
            <div class="mt-4 bg-gray-50 p-4 rounded-2xl">
                <h3 id="offerTitle" class="text-[#D97706]">جاري التحميل...</h3>
            </div>
        </section>
    </main>

    <script>
        const API_URL = 'ضع_رابط_الـ_Web_App_المحدث_هنا';
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if(id) {
            fetch(`${API_URL}?id=${id}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('userDiscount').innerText = data.discount + "%";
                    document.getElementById('userGift').innerText = data.gift;
                    document.getElementById('offerTitle').innerText = data.latestOffer;
                });
        }
    </script>
</body>
</html>
