<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceFlow | بوابتك الرقمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #0A0A0A; }
        .card-container { background: #ffffff; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: inline-block; }
        .btn-hover:hover { transform: translateY(-4px) scale(1.1); }
    </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">

    <main class="max-w-md w-full">
        <div class="card-container rounded-[2rem] p-8 shadow-[0_20px_50px_rgba(0,0,0,0.3)]">
            
            <header class="text-center mb-8 border-b border-gray-100 pb-6">
                <h1 id="userName" class="text-3xl font-extrabold text-[#D97706] mb-2">مرحباً بك</h1>
                <p class="text-gray-500">نحن نهتم بجمال سيارتك</p>
            </header>

            <section class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-gray-50 p-4 rounded-2xl text-center">
                    <span class="block text-gray-400 text-xs uppercase tracking-wider mb-1">الخصم</span>
                    <span id="userDiscount" class="text-[#059669] font-bold text-2xl">0%</span>
                </div>
                <div class="bg-gray-50 p-4 rounded-2xl text-center">
                    <span class="block text-gray-400 text-xs uppercase tracking-wider mb-1">الهدايا</span>
                    <span id="userGift" class="text-gray-800 font-bold text-lg">—</span>
                </div>
            </section>

            <section class="mb-8 text-center">
                <h2 class="text-sm font-bold text-gray-800 uppercase tracking-widest mb-4">قيم تجربتك</h2>
                <div class="flex justify-center gap-6 text-4xl">
                    <a href="https://g.page/r/CZ272y52HBYEEBE/review" class="btn-hover">😞</a>
                    <a href="https://g.page/r/CZ272y52HBYEEBE/review" class="btn-hover">😐</a>
                    <a href="https://g.page/r/CZ272y52HBYEEBE/review" class="btn-hover">😊</a>
                    <a href="https://g.page/r/CZ272y52HBYEEBE/review" class="btn-hover">🤩</a>
                </div>
            </section>

            <section class="grid grid-cols-2 gap-4 mb-8">
                <a href="https://www.tiktok.com/@yaf3e59" class="btn-hover flex items-center justify-center bg-black text-white p-3 rounded-2xl">
                    <i class="fab fa-tiktok ml-2"></i> تيك توك
                </a>
                <a href="#" class="btn-hover flex items-center justify-center bg-[#D97706] text-white p-3 rounded-2xl font-bold">
                    <i class="fab fa-snapchat ml-2"></i> سناب شات
                </a>
            </section>

            <section>
                <h2 class="text-sm font-bold text-gray-800 uppercase tracking-widest mb-4 border-r-4 border-[#D97706] pr-3">العروض المتاحة</h2>
                <div id="offers-grid">
                    <article class="bg-gray-50 p-4 rounded-2xl flex items-center">
                        <div class="w-16 h-16 bg-gray-200 rounded-xl ml-4"></div>
                        <div>
                            <h3 id="offerTitle" class="font-bold text-gray-800">جاري التحميل...</h3>
                        </div>
                    </article>
                </div>
            </section>
        </div>
    </main>

    <script>
        // الرابط الخاص بك
        const API_URL = 'https://script.google.com/macros/s/AKfycbxuajqn2D8Tpori3VU6dHl_mfYBMbQNPsSp8Lwgzegeh__8eprzfjN3tvYnsHqCKV4gXg/exec';
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if(id) {
            fetch(`${API_URL}?id=${id}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('userName').innerText = "أهلاً " + data.profile.name;
                    document.getElementById('userDiscount').innerText = data.profile.discount + "%";
                    document.getElementById('userGift').innerText = data.profile.gift;
                    if(data.offers.length > 0) {
                        document.getElementById('offerTitle').innerText = data.offers[0].title;
                    }
                });
        }
    </script>
</body>
</html>
