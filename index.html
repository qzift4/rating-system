<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceFlow | بوابتك الرقمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* إضافة تأثير الزجاج الفاخر */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* حركة دخول العناصر */
        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: #050505; }
    </style>
</head>
<body class="text-white p-4 min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full rounded-[2rem] p-8 shadow-2xl glass-card fade-in">
        
        <div class="text-center mb-8 border-b border-white/10 pb-6">
            <h1 class="text-3xl font-bold text-yellow-500 mb-2">أهلاً بك</h1>
            <p class="text-gray-400">نحن نهتم بجمال سيارتك</p>
            <div class="mt-6 bg-black/40 p-5 rounded-2xl flex justify-around border border-white/5">
                <div class="text-center">
                    <span class="block text-gray-500 text-sm">خصمك</span>
                    <span class="text-green-400 font-bold text-2xl">0%</span>
                </div>
                <div class="text-center">
                    <span class="block text-gray-500 text-sm">هديتك</span>
                    <span class="text-gray-200 font-bold text-lg">---</span>
                </div>
            </div>
        </div>

        <div class="mb-8 text-center">
            <h2 class="text-lg font-bold mb-4">قيّم تجربتك معنا</h2>
            <div class="flex justify-center gap-4 text-3xl">
                <button class="hover:scale-125 transition">😞</button>
                <button class="hover:scale-125 transition">😐</button>
                <button class="hover:scale-125 transition">😊</button>
                <button class="hover:scale-125 transition">🤩</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <a href="#" class="flex items-center justify-center bg-gray-800 p-3 rounded-2xl hover:bg-black transition border border-white/10">
                <i class="fab fa-tiktok ml-2 text-xl"></i> تيك توك
            </a>
            <a href="#" class="flex items-center justify-center bg-yellow-500 text-black p-3 rounded-2xl font-bold hover:bg-yellow-400 transition">
                <i class="fab fa-snapchat ml-2 text-xl"></i> سناب شات
            </a>
        </div>

        <h2 class="text-lg font-bold mb-4 border-r-4 border-yellow-500 pr-3">عروضنا الأسبوعية</h2>
        <div id="offers-grid" class="space-y-4">
            <div class="glass-card p-4 rounded-2xl flex items-center">
                <div class="w-16 h-16 bg-gray-700 rounded-xl ml-4"></div>
                <div>
                    <h3 class="font-bold">باقة النانو سيراميك</h3>
                    <p class="text-yellow-500 text-sm">خصم 20% لفترة محدودة</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
