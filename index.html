<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>

    <title>ServiceFlow | Elite Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap');
        
        :root {
            --gold: #D97706;
            --emerald: #059669;
            --dark: #0A0A0A;
        }
        
        body { font-family: 'Tajawal', sans-serif; background-color: var(--dark); }
        
        .card-container {
            background: #ffffff;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: inline-block; }
        .btn-hover:hover { transform: translateY(-4px) scale(1.1); }
    </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">

    <main class="max-w-md w-full animate-in fade-in zoom-in duration-500">

            <section class="mb-8 text-center">

                <div class="flex justify-center gap-6 text-4xl">
                    <a href="https://g.page/r/CZ272y52HBYEEBE/review" class="btn-hover">😞</a>
                    <a href="https://g.page/r/CZ272y52HBYEEBE/review" class="btn-hover">😐</a>

                    <i class="fab fa-tiktok ml-2"></i> تيك توك

                </a>
            </section>

            <section>
                <h2 class="text-sm font-bold text-gray-800 uppercase tracking-widest mb-4 border-r-4 border-[#D97706] pr-3">العروض المتاحة</h2>
                <div class="space-y-4">
                    <article class="bg-gray-50 p-4 rounded-2xl flex items-center hover:bg-gray-100 transition-colors">
                        <div class="w-16 h-16 bg-gray-200 rounded-xl ml-4 overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1607860108855-64acf18783a4?q=80&w=200" class="w-full h-full object-cover">
                        </div>
                        <div>

</html>
